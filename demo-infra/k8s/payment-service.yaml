# k8s/payment-service.yaml
# Violations: K8S-001 HIGH, K8S-002 CRITICAL, K8S-003 HIGH

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-api
          image: payment-service:v1.2.0
          securityContext:
            privileged: true              # CRITICAL: Privileged container
            runAsNonRoot: false           # HIGH: Running as root container
            runAsUser: 0                  # HIGH: Explicitly running as root user
          env:
            - name: DATABASE_URL
              value: "postgresql://db_admin:db_password_123_unsafe@10.0.1.5:5432/production"
            - name: STRIPE_API_KEY
              value: "sk_live_51NzABC123XYZ789" # HIGH: Hardcoded stripe secret in environment variables
          ports:
            - containerPort: 8080
