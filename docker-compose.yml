version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloudguard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cloudguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cloudguard-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cloudguard
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENV: development
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cloudguard-celery-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cloudguard
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENV: development
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - ./apps/api:/app
    command: celery -A tasks worker --loglevel=info

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: cloudguard-network
